name: Feature Request
description: Suggest a new feature or enhancement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to Anesis!
        Please describe your idea in as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem this feature solves
      description: Is your feature request related to a problem? Describe it.
      placeholder: "I find it difficult to... / There is no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you would like this feature to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you have considered.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This feature aligns with Anesis's core purpose (meditation podcast generation).
          required: false
